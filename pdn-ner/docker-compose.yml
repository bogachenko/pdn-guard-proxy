services:
  pdn-ner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdn-ner
    restart: unless-stopped
    ports:
      - "127.0.0.1:8010:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s